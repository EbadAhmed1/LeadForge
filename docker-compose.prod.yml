
services:
  # ─── PostgreSQL 15 ────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: saas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-leadforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-leadforge_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No external ports — only accessible by other containers
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leadforge} -d ${POSTGRES_DB:-leadforge_db}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # No external ports — only accessible by other containers
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 192M

  # ─── FastAPI Application ──────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-leadforge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-leadforge_db}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-leadforge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-leadforge_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      PYTHONPATH: /app
    ports:
      - "127.0.0.1:8000:8000"  # Only accessible via localhost (Nginx proxies to it)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    # Production: no --reload, multiple workers
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          memory: 768M

  # ─── Arq Background Worker ────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-leadforge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-leadforge_db}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-leadforge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-leadforge_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-saas-lead-pipeline}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq worker.WorkerSettings
    deploy:
      resources:
        limits:
          memory: 768M

volumes:
  postgres_data:
  redis_data:
