# alembic.ini — Alembic configuration file

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template used for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Truncate slug to keep filenames short
truncate_slug_length = 40

# Use timezone-aware timestamps in revision files
timezone = UTC

# Set to "true" for source encoding declaration in migration scripts
output_encoding = utf-8

# ─── Database URL ─────────────────────────────────────────────────────────────
# This is overridden in alembic/env.py from environment variables.
# The value here is only used if env.py does NOT override it.
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/saas_db

# ─── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
